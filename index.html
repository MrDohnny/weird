  <!-- técnica 3 — JS injeta as tags restantes em tempo de execução
       crawlers sem engine JS (como o Discord) nunca chegam a ver essas tags -->
  <script>
  (function(){
    // valores em base64 — invisíveis para análise estática do HTML
    const _b = atob;
    const defs = [
      // [atributo, valor,            atributo2,  valor2]
      ['property', _b('b2c6dHlwZQ=='),            'content', _b('d2Vic2l0ZQ==')],
      ['property', _b('b2c6dmlkZW8='),            'content', _b('aHR0cHM6Ly9za2V0Y2hmYWIuY29tL21vZGVscy9jNzVhYjZiNDNlMWU0OWRhOTUyMzYxZWU2YjM2ZjBhNC9lbWJlZD9hdXRvc3RhcnQ9MSZ1aV90aGVtZT1kYXJr')],
      ['property', _b('b2c6dmlkZW86dHlwZQ=='),   'content', _b('dGV4dC9odG1s')],
      ['property', _b('b2c6dmlkZW86d2lkdGg='),   'content', '800'],
      ['property', _b('b2c6dmlkZW86aGVpZ2h0'),   'content', '600'],
    ];
    defs.forEach(([a1,v1,a2,v2]) => {
      const m = document.createElement('meta');
      m.setAttribute(a1, v1);
      m.setAttribute(a2, v2);
      document.head.appendChild(m);
    });

    // JSON-LD 3DModel injetado via JS — também invisível para crawlers sem JS
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': '3DModel',
      name: _b('Qmx1IC0gQW5pbWUgR2lybCBDaGFyYWN0ZXI='),
      description: 'Interactive 3D anime girl character model by ridho.mnf on Sketchfab.',
      contentUrl: _b('aHR0cHM6Ly9za2V0Y2hmYWIuY29tL21vZGVscy9jNzVhYjZiNDNlMWU0OWRhOTUyMzYxZWU2YjM2ZjBhNC9lbWJlZA=='),
      encodingFormat: 'model/gltf-binary',
      creator: { '@type': 'Person', name: 'ridho.mnf' },
    });
    document.head.appendChild(s);
  })();
  </script>

  <title>Blu - Anime Girl Character · 3D Model</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      gap: 16px;
    }

    #loader-wrap {
      position: relative;
      width: min(92vw, 860px);
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(120, 80, 255, 0.35);
    }

    canvas#bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #viewer.ready { opacity: 1; }

    /* portal tem cursor de pointer e hint visual */
    portal#viewer {
      cursor: pointer;
    }
    portal#viewer.ready::after {
      content: '⤢ expandir';
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    #hud {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #hud.hidden { opacity: 0; }

    .spinner {
      width: 54px;
      height: 54px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);

      color: #fff;
      letter-spacing: 0.02em;

      bottom: 10px;
      right: 14px;
      font-size: 0.68rem;
      font-family: monospace;
      color: rgba(167,139,250,0.5);
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }

<body>

  <div id="loader-wrap">
    <canvas id="bg"></canvas>

    <div id="hud">
      <div class="spinner"></div>
      <span class="label">Carregando modelo 3D…</span>
    </div>

    <!-- portal: embedding de nova geração, ativa com clique -->
    <portal
      id="viewer"
      src="https://sketchfab.com/models/c75ab6b43e1e49da952361ee6b36f0a4/embed?autostart=1&ui_theme=dark&ui_infos=0&ui_watermark=0"
    ></portal>

    <!-- fallback iframe para navegadores sem suporte a portal -->
    <iframe
      id="viewer-fallback"
      src="https://sketchfab.com/models/c75ab6b43e1e49da952361ee6b36f0a4/embed?autostart=1&ui_theme=dark&ui_infos=0&ui_watermark=0"
      allow="autoplay; fullscreen; xr-spatial-tracking"
      allowfullscreen
      style="display:none;position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;transition:opacity 0.8s ease;"
    ></iframe>

  <h1>Blu — Anime Girl Character</h1>
  <p class="sub">por ridho.mnf · Sketchfab</p>

  <div id="build">build · msg-14 · 2026-05-11</div>

  <script>
    /* ── particle canvas ── */
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    new ResizeObserver(resize).observe(canvas);

    const DOTS = 90;
    const dots = Array.from({ length: DOTS }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: 0.4 + Math.random() * 1.4,
      vx: (Math.random() - 0.5) * 0.00015,
      vy: (Math.random() - 0.5) * 0.00015,
      a: Math.random() * Math.PI * 2,
    }));

    function draw(ts) {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      /* soft gradient bg */
      const g = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, W*.7);
      g.addColorStop(0,   '#1a0d2e');
      g.addColorStop(1,   '#0a0a0a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      /* grid lines */
      ctx.strokeStyle = 'rgba(120,80,255,0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 48) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
      for (let y = 0; y < H; y += 48) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

      /* particles */
      dots.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0;
        if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
        const px = d.x * W, py = d.y * H;
        const alpha = 0.3 + 0.4 * Math.sin(ts * 0.001 + d.a);
        ctx.beginPath();
        ctx.arc(px, py, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(167,139,250,${alpha})`;
        ctx.fill();
      });

      /* scan line */
      const scanY = ((ts * 0.04) % (H + 40)) - 20;
      const sg = ctx.createLinearGradient(0, scanY - 10, 0, scanY + 10);
      sg.addColorStop(0,   'rgba(167,139,250,0)');
      sg.addColorStop(0.5, 'rgba(167,139,250,0.12)');
      sg.addColorStop(1,   'rgba(167,139,250,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(0, scanY - 10, W, 20);

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    const hud      = document.getElementById('hud');
    const portal   = document.getElementById('viewer');
    const fallback = document.getElementById('viewer-fallback');

    const portalSupported = typeof HTMLPortalElement !== 'undefined';

    if (portalSupported) {
      /* ── modo portal ── */
      fallback.remove();

      portal.addEventListener('load', () => {
        setTimeout(() => {
          portal.classList.add('ready');
          hud.classList.add('hidden');
        }, 1200);
      });

      /* clique ativa a transição para a página embutida */
      portal.addEventListener('click', () => {
        portal.activate().catch(() => {});
      });

    } else {
      /* ── fallback iframe ── */
      portal.remove();
      fallback.style.display = 'block';

      fallback.addEventListener('load', () => {
        setTimeout(() => {
          fallback.style.opacity = '1';
          hud.classList.add('hidden');
        }, 1200);
      });
    }
  </script>
</body>
